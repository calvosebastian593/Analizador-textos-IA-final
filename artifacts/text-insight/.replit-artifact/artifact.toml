kind = "web"
previewPath = "/"
title = "AI Text Insight"
version = "1.0.0"
id = "artifacts/text-insight"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24967

[services.development]
run = "pnpm --filter @workspace/text-insight run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/text-insight", "run", "build" ]
publicDir = "artifacts/text-insight/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24967"
BASE_PATH = "/"
